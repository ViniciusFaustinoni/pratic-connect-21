<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>PRATIC</title>
    <meta name="title" content="PRATIC - Proteção Veicular" />
    <meta name="description" content="Sistema de proteção veicular PRATIC. Gerencie veículos, boletos, assistência e muito mais." />
    <meta name="author" content="PRATIC" />
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://iyxdgmukrrdkffraptsx.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload LCP image -->
    <link rel="preload" as="image" href="/logos/logo-full-light.png" fetchpriority="high" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/pratic-logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/pratic-logo.png" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/pwa-192x192.png" />
    
    <!-- PWA Manifest - Dinâmico baseado na rota -->
    <link rel="alternate" id="pwa-manifest" />
    
    <!-- PWA iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PRATIC" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Theme Colors -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="msapplication-TileColor" content="#16a34a" />
    <meta name="msapplication-TileImage" content="/pwa-192x192.png" />
    
    <!-- Prevent telephone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:title" content="PRATIC - Proteção Veicular" />
    <meta property="og:description" content="Sistema de proteção veicular PRATIC" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PRATIC" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Script para definir manifest e meta tags baseado na rota -->
    <script>
      (function() {
        var path = window.location.pathname;
        var hostname = window.location.hostname;
        var isInstalador = path.startsWith('/instalador');
        var isPreviewHost = hostname.endsWith('.lovableproject.com') || hostname.startsWith('id-preview--');
        var manifestHref = isInstalador
          ? '/manifest-profissional.json'
          : '/manifest-associado.json';
        
        // Atualizar manifest
        var manifestLink = document.getElementById('pwa-manifest');
        if (manifestLink) {
          if (isPreviewHost) {
            manifestLink.removeAttribute('href');
            manifestLink.setAttribute('rel', 'alternate');
          } else {
            manifestLink.setAttribute('rel', 'manifest');
            manifestLink.setAttribute('href', manifestHref);
          }
        }
        
        // Atualizar título
        document.title = isInstalador 
          ? 'PRATIC Profissional' 
          : 'PRATIC';
        
        // Atualizar theme-color
        var themeColor = isInstalador ? '#1e293b' : '#16a34a';
        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) themeColorMeta.content = themeColor;
        
        var tileColorMeta = document.querySelector('meta[name="msapplication-TileColor"]');
        if (tileColorMeta) tileColorMeta.content = themeColor;
        
        // Atualizar apple-mobile-web-app-title
        var appTitleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (appTitleMeta) appTitleMeta.content = isInstalador ? 'PRATIC Pro' : 'PRATIC';
        
        // Atualizar ícones para instalador
        if (isInstalador) {
          var appleTouchIcons = document.querySelectorAll('link[rel="apple-touch-icon"]');
          appleTouchIcons.forEach(function(icon) {
            icon.href = icon.href.replace('pwa-192x192.png', 'pwa-instalador-192x192.png');
          });
          
          var tileImageMeta = document.querySelector('meta[name="msapplication-TileImage"]');
          if (tileImageMeta) tileImageMeta.content = '/pwa-instalador-192x192.png';
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
